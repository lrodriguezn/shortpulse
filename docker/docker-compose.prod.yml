# ShortPulse — Dokploy production Compose.
#
# Adapted from docker-compose.yml for Dokploy deployment:
#  - No container_name (Dokploy manages naming)
#  - dokploy-network for Traefik routing
#  - Traefik labels for domain: shortpulse.lgyss.top
#  - Postgres not exposed to host (internal only)
#
# Environment variables are set in the Dokploy dashboard and
# written to .env (DATABASE_URL, PORT, BASE_URL, etc.).

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - '${PORT:-3000}'
    environment:
      DATABASE_URL: postgresql://shortpulse:shortpulse@postgres:5432/shortpulse
      PORT: '${PORT:-3000}'
      BASE_URL: '${BASE_URL:-https://shortpulse.lgyss.top}'
      GEOIP_DB_PATH: '${GEOIP_DB_PATH:-/app/geoip/GeoLite2-City.mmdb}'
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:'+(process.env.PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dokploy-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.shortpulse.rule=Host(`shortpulse.lgyss.top`)'
      - 'traefik.http.routers.shortpulse.entrypoints=websecure'
      - 'traefik.http.routers.shortpulse.tls.certresolver=letsencrypt'
      - 'traefik.http.services.shortpulse.loadbalancer.server.port=${PORT:-3000}'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: shortpulse
      POSTGRES_PASSWORD: shortpulse
      POSTGRES_DB: shortpulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shortpulse -d shortpulse']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

volumes:
  pgdata:

networks:
  dokploy-network:
    external: true
